<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Explore Rumah 360</title>

    <!-- Pannellum -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #panorama {
            width: 100vw;
            height: 100vh;
        }

        /* 🔥 HOTSPOT CUSTOM */
        .pnlm-hotspot-base {
            transform: scale(2); /* ukuran utama */
            transition: 0.3s;
        }

        .pnlm-hotspot {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        /* panah */
        .pnlm-hotspot-base::after {
            content: "➤";
            display: block;
            font-size: 28px;
            color: yellow;
            margin-top: 5px;
        }

        /* hover effect */
        .pnlm-hotspot-base:hover {
            transform: scale(2.5);
        }

        .pnlm-hotspot:hover {
            background-color: orange;
            color: black;
        }
    </style>
</head>

<body>

<div id="panorama"></div>

<script>
pannellum.viewer("panorama", {

    "default": {
        "firstScene": "ruang_tamu",
        "sceneFadeDuration": 1000
    },

    "scenes": {

        "ruang_tamu": {
            "title": "Ruang Tamu",
            "panorama": "Ruang_tamu.jpg.jpeg",
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 80,
                    "type": "scene",
                    "text": "Ke Kamar",
                    "sceneId": "kamar"
                },
                {
                    "pitch": 0,
                    "yaw": 20,
                    "type": "scene",
                    "text": "Ke Teras",
                    "sceneId": "teras"
                },
                {
                    "pitch": 0,
                    "yaw": 170,
                    "type": "scene",
                    "text": "Ke Dapur",
                    "sceneId": "dapur"
                }
            ]
        },

        "kamar": {
            "title": "Kamar",
            "panorama": "360photoconverter.jpg.jpeg",
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 0,
                    "type": "scene",
                    "text": "Kembali ke Ruang Tamu",
                    "sceneId": "ruang_tamu"
                }
            ]
        },

        "teras": {
            "title": "Teras",
            "panorama": "PANO_20260328_142137_11.jpg.jpeg",
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 113,
                    "type": "scene",
                    "text": "Masuk ke Ruang Tamu",
                    "sceneId": "ruang_tamu"
                }
            ]
        },

        "dapur": {
            "title": "Dapur",
            "panorama": "Dapur_v2.jpg.jpeg",
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": -80,
                    "type": "scene",
                    "text": "Kembali ke Ruang Tamu",
                    "sceneId": "ruang_tamu"
                }
            ]
        }

    }
});
</script>

</body>
</html>
